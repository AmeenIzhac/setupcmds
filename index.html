<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup Commands</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      width: 100%;
      max-width: 800px;
    }
    .snippet {
      background: #e2e8f0;
      border-radius: 14px;
      padding: 20px;
      margin: 24px 0;
      cursor: pointer;
      position: relative;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }
    .snippet:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.12);
    }
    code {
      font-family: monospace;
      font-size: 14px;
      word-break: break-all;
      display: block;
    }
    .copy-label {
      position: absolute;
      top: 10px;
      right: 14px;
      font-size: 12px;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="snippet" onclick="copy(this)">
      <span class="copy-label">Copy</span>
      <code>curl -L -O "https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-$(uname)-$(uname -m).sh"</code>
    </div>

    <div class="snippet" onclick="copy(this)">
      <span class="copy-label">Copy</span>
      <code>bash Miniforge3-$(uname)-$(uname -m).sh</code>
    </div>

    <div class="snippet" onclick="copy(this)">
      <span class="copy-label">Copy</span>
      <code>curl -fsSL https://claude.ai/install.sh | bash</code>
    </div>

    <div class="snippet" onclick="copy(this)">
      <span class="copy-label">Copy</span>
      <code>echo 'export PATH="$HOME/.local/bin:$PATH"' >> ~/.bashrc && source ~/.bashrc</code>
    </div>

  </div>

  <script>
    function copy(el) {
      const code = el.innerText.replace('Copy','').trim();
      navigator.clipboard.writeText(code);
      const label = el.querySelector('.copy-label');
      label.innerText = 'Copied';
      setTimeout(() => label.innerText = 'Copy', 1200);
    }
  </script>

</body>
</html>
