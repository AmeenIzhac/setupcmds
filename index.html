<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup Commands</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      width: 100%;
      max-width: 800px;
    }
    .snippet {
      background: #e2e8f0;
      border-radius: 14px;
      padding: 20px;
      margin: 24px 0;
      cursor: pointer;
      position: relative;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }
    .snippet:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.12);
    }
    code {
      font-family: monospace;
      font-size: 14px;
      word-break: break-all;
      display: block;
      padding-right: 30px;
    }
    .copy-btn {
      position: absolute;
      top: 50%;
      right: 14px;
      transform: translateY(-50%);
      opacity: 0.6;
      cursor: pointer;
    }
    .copy-btn:hover {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="snippet" onclick="copy(this)">
      <span class="copy-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <rect x="3" y="3" width="13" height="13" rx="2"/>
        </svg>
      </span>
      <code>curl -L -O "https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-$(uname)-$(uname -m).sh"</code>
    </div>

    <div class="snippet" onclick="copy(this)">
      <span class="copy-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <rect x="3" y="3" width="13" height="13" rx="2"/>
        </svg>
      </span>
      <code>bash Miniforge3-$(uname)-$(uname -m).sh</code>
    </div>

    <div class="snippet" onclick="copy(this)">
      <span class="copy-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <rect x="3" y="3" width="13" height="13" rx="2"/>
        </svg>
      </span>
      <code>curl -fsSL https://claude.ai/install.sh | bash</code>
    </div>

    <div class="snippet" onclick="copy(this)">
      <span class="copy-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <rect x="3" y="3" width="13" height="13" rx="2"/>
        </svg>
      </span>
      <code>echo 'export PATH="$HOME/.local/bin:$PATH"' >> ~/.bashrc && source ~/.bashrc</code>
    </div>

  </div>

  <script>
    function copy(el) {
      const code = el.querySelector("code").innerText;
      navigator.clipboard.writeText(code);

      const icon = el.querySelector("svg");
      icon.style.opacity = "0.3";
      setTimeout(() => icon.style.opacity = "1", 500);
    }
  </script>
</body>
</html>
